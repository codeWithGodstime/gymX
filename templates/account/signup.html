{% extends '_auth_base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - GymX{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-dumbbell"></i>
                </div>
                <h1 class="auth-title">GymX</h1>
                <h2 class="auth-subtitle">Create Your Account</h2>
                <p class="auth-description">Start managing your gym today</p>
            </div>

            <!-- Form -->
            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form|crispy }}
                <button class="btn btn-auth" type="submit">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </form>

            <!-- Footer Links -->
            <div class="auth-footer">
                <hr>
                <p class="text-center">
                    Already have an account?<br>
                    <a href="{% url 'account_login' %}" class="auth-link-primary">Log in here</a>
                </p>
                <p class="text-center mt-4">
                    <a href="/" class="auth-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
